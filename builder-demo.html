<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>LandingPage Builder — Local Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link
  rel="stylesheet"
  as="style"
  crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
/>
<style>
/* =============================================================================
 * 토큰
 * ===========================================================================*/
:root {
  --bg: #0F1115;
  --panel: #171A21;
  --panel-2: #1F232C;
  --border: #262B36;
  --accent: #7C5CFF;
  --accent-2: #5B8CFF;
  --text: #E6E8EE;
  --muted: #8A92A6;
  --danger: #FF5C70;
  --success: #3BD16F;

  /* ODS — preview 영역에서 사용 */
  --ods-primary: #00A1FF;
  --ods-resp-green: #05A558;
  --ods-star: #FFC300;
  --ods-text-primary: #141414;
  --ods-text-secondary: #2F3438;
  --ods-text-tertiary: #8C8C8C;
  --ods-border: #E0E0E0;
  --ods-border-light: #EDEDED;
  --ods-surface-gray: #F5F5F5;
  --ods-surface-light: #F7F9FA;
  --ods-gradient-resp: linear-gradient(90deg, #59D99B 0%, #0AB261 100%);
}

* { box-sizing: border-box; }
html, body { height: 100%; margin: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* =============================================================================
 * 빌더 레이아웃 (3-pane)
 * ===========================================================================*/
.app { display: flex; flex-direction: column; height: 100vh; }
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; padding: 0 16px;
  background: var(--panel); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.app-header .left { display: flex; align-items: center; gap: 12px; }
.app-header .right { display: flex; align-items: center; gap: 8px; }
.app-logo {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent); color: white; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
}
.app-title { font-weight: 500; }
.app-version {
  padding: 2px 8px; background: var(--panel-2); border-radius: 4px;
  font-size: 11px; color: var(--muted); margin-left: 4px;
}
.btn {
  padding: 6px 12px; border-radius: 8px; font-size: 12px;
  background: var(--panel-2); border: 1px solid var(--border); color: var(--text);
}
.btn:hover { border-color: var(--accent); }
.btn-success { background: var(--success); color: #000; border: 0; font-weight: 500; }
.btn-primary { background: var(--accent); color: white; border: 0; font-weight: 500; }

.app-body { display: flex; flex: 1; min-height: 0; }
.pane {
  display: flex; flex-direction: column;
  background: var(--panel);
  border-right: 1px solid var(--border);
}
.pane.left { width: 260px; flex-shrink: 0; }
.pane.center { flex: 1; background: #0A0C12; border-right: 1px solid var(--border); min-width: 0; }
.pane.right { width: 340px; flex-shrink: 0; border-right: 0; border-left: 1px solid var(--border); }

.pane-head {
  height: 48px; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.pane-head .label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
  color: var(--muted);
}

.scroll {
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.scroll::-webkit-scrollbar { width: 8px; height: 8px; }
.scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* =============================================================================
 * 좌측 SectionTree (Next `SectionTree` 와 동일 UX)
 * - 행 라벨: SECTION_PRESETS[preset].label 한 줄 (이름/서브타이틀 없음)
 * - 「+ 섹션 추가」: 기본 7 + 마케팅 풀페이지 UI 7 — 라벨 규칙은 Next `section-add-menu.ts` 와 동일
 * ===========================================================================*/
.tree-list { flex: 1; padding: 8px 0; }
.tree-item {
  display: flex; align-items: center; gap: 8px;
  margin: 2px 8px; padding: 8px;
  border: 1px solid transparent; border-radius: 8px;
  cursor: pointer; transition: all 0.1s;
}
.tree-item:hover { border-color: var(--border); background: var(--panel-2); }
.tree-item.selected { border-color: var(--accent); background: rgba(124, 92, 255, 0.1); }
.tree-item.drag-over { border-color: var(--accent-2); }
.tree-item .handle { width: 12px; text-align: center; color: var(--muted); cursor: grab; }
.tree-item .handle.locked { cursor: not-allowed; }
.tree-item .label {
  flex: 1; min-width: 0;
}
.tree-item .label .name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-item .remove {
  width: 20px; height: 20px; border-radius: 4px; border: 0; background: transparent; color: var(--muted);
  display: none; align-items: center; justify-content: center; padding: 0;
}
.tree-item:hover .remove { display: flex; }
.tree-item .remove:hover { background: rgba(255, 92, 112, 0.2); color: var(--danger); }

.tree-footer {
  padding: 12px; border-top: 1px solid var(--border); position: relative; flex-shrink: 0;
}
.tree-add-btn {
  width: 100%; padding: 8px; border-radius: 8px; font-size: 12px;
  border: 1px dashed var(--border); background: transparent; color: var(--muted);
}
.tree-add-btn:hover { border-color: var(--accent); color: var(--text); }
.tree-add-menu {
  position: absolute; bottom: 50px; left: 12px; right: 12px; z-index: 20;
  background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
  padding: 4px; box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  max-height: 280px; overflow-y: auto;
}
.tree-add-menu.hidden { display: none; }
.tree-add-menu button {
  display: block; width: 100%; text-align: left; padding: 8px;
  background: transparent; border: 0; border-radius: 4px; color: var(--text);
}
.tree-add-menu button:hover { background: var(--panel); }
.tree-add-menu .menu-label { font-size: 12px; }
.tree-add-menu .add-menu-group {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--muted);
  padding: 6px 8px 2px;
  margin-top: 4px;
}
.tree-add-menu .add-menu-group:first-child { margin-top: 0; }

/* =============================================================================
 * 가운데 Preview
 * ===========================================================================*/
.preview-head {
  height: 48px; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--panel); border-bottom: 1px solid var(--border);
}
.viewport-toggle { display: flex; gap: 4px; }
.viewport-toggle button {
  padding: 4px 10px; border-radius: 4px; font-size: 11px;
  border: 0; background: transparent; color: var(--muted);
}
.viewport-toggle button.active { background: var(--accent); color: white; }
.preview-meta { font-size: 11px; color: var(--muted); }

.preview-scroll { flex: 1; padding: 24px; overflow-y: auto; }
.preview-frame {
  margin: 0 auto; max-width: 100%;
  background: white; color: var(--ods-text-primary);
  border-radius: 12px; border: 1px solid var(--border);
  box-shadow: 0 24px 48px rgba(0,0,0,0.4);
  transition: width 0.2s;
  font-family: "Pretendard", system-ui, sans-serif;
}
.preview-note { text-align: center; color: var(--muted); font-size: 11px; margin-top: 12px; }

/* =============================================================================
 * Preview content (재현된 랜딩페이지) — Apps Script Index.html 과 같은 스타일
 * ===========================================================================*/
.lp { font-size: 14px; line-height: 1.5; }
.lp section.lp-section-wrap {
  position: relative; cursor: pointer; outline-offset: -2px;
}
.lp section.lp-section-wrap:hover { outline: 1px solid rgba(124,92,255,0.5); }
.lp section.lp-section-wrap.selected { outline: 2px solid var(--accent); }
.lp section.lp-section-wrap > .section-tag {
  position: absolute; top: 8px; left: 8px; z-index: 5;
  background: rgba(23, 26, 33, 0.9); color: var(--text);
  padding: 2px 6px; border-radius: 4px; font-size: 10px;
  pointer-events: none;
}

.lp-header {
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; padding: 0 16px; border-bottom: 1px solid var(--ods-border);
}
.lp-logo { font-weight: 600; font-size: 17px; }
.lp-nav span { margin-left: 16px; color: var(--ods-text-secondary); font-size: 12px; }

.lp-hero { background: var(--ods-surface-gray); padding: 40px 20px; }
.lp-hero-inner { display: flex; flex-direction: column; gap: 24px; max-width: 1280px; margin: 0 auto; }
.lp-hero-title { font-size: 24px; line-height: 32px; font-weight: 600; letter-spacing: -0.3px; white-space: pre-line; }
.lp-hero-sub { margin-top: 12px; color: var(--ods-text-secondary); font-size: 15px; line-height: 24px; }
.lp-hero-cta { margin-top: 24px; display: flex; gap: 8px; flex-wrap: wrap; }
.lp-hero-image {
  flex: 1; height: 180px; background: var(--ods-surface-light);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  color: var(--ods-text-tertiary); font-size: 11px;
}
.preview-frame[data-viewport="desktop"] .lp-hero-inner { flex-direction: row; align-items: center; gap: 48px; padding: 60px 80px; }
.preview-frame[data-viewport="desktop"] .lp-hero-title { font-size: 32px; line-height: 42px; }
.preview-frame[data-viewport="desktop"] .lp-hero-image { height: 280px; }

.lp-btn {
  border-radius: 8px; padding: 12px 20px; font-size: 14px; font-weight: 600;
  border: 0; cursor: pointer;
}
.lp-btn-primary { background: var(--ods-primary); color: white; }
.lp-btn-secondary { background: white; color: var(--ods-text-primary); border: 1px solid var(--ods-border); }

.lp-section { padding: 40px 20px; }
.preview-frame[data-viewport="tablet"] .lp-section { padding: 60px 40px; }
.preview-frame[data-viewport="desktop"] .lp-section { padding: 60px 80px; }
.lp-section-title { margin-bottom: 24px; }
.lp-section-title .sub { color: var(--ods-text-tertiary); font-size: 15px; line-height: 24px; margin-bottom: 4px; }
.lp-section-title .main {
  font-size: 24px; line-height: 32px; font-weight: 600;
  white-space: pre-line; color: var(--ods-text-primary);
}
.preview-frame[data-viewport="desktop"] .lp-section-title .main { font-size: 32px; line-height: 42px; }

/* Card layouts */
.lp-grid { display: grid; }
.preview-frame[data-viewport="mobile"] .lp-grid { grid-template-columns: repeat(var(--cols-mobile, 1), minmax(0, 1fr)); }
.preview-frame[data-viewport="tablet"] .lp-grid { grid-template-columns: repeat(var(--cols-tablet, 2), minmax(0, 1fr)); }
.preview-frame[data-viewport="desktop"] .lp-grid { grid-template-columns: repeat(var(--cols-desktop, 4), minmax(0, 1fr)); }

.lp-carousel { position: relative; overflow: hidden; }
.lp-carousel-track { display: flex; width: max-content; }
.lp-carousel-track:not(.marquee) { overflow-x: auto; width: auto; }
.lp-carousel-item { flex-shrink: 0; }
.lp-carousel-track.marquee { animation: lp-marquee var(--marquee-duration, 30s) linear infinite; }
@keyframes lp-marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

.lp-row { display: flex; }

/* Cells */
.lp-card { background: white; border-radius: 12px; padding: 16px; }
.lp-card.card-usp { border: 1px solid var(--ods-border); }
.lp-card.card-review { box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
.lp-card.card-step { background: var(--ods-surface-light); }
.lp-card.card-service {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  text-decoration: none; color: inherit;
}
.lp-card.card-service:hover { background: rgba(0,0,0,0.02); }

.lp-tag {
  display: inline-block; background: var(--ods-surface-gray); color: var(--ods-text-secondary);
  font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px;
}
.lp-card-title { font-size: 17px; line-height: 22px; font-weight: 600; color: var(--ods-text-primary); white-space: pre-line; }
.lp-card-body { font-size: 14px; line-height: 20px; color: var(--ods-text-tertiary); margin-top: 4px; white-space: pre-line; }
.lp-card-media {
  margin-top: 12px; height: 80px; background: var(--ods-surface-light); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--ods-text-tertiary); font-size: 10px;
}
.lp-card-icon {
  width: 64px; height: 64px; border-radius: 50%; background: var(--ods-surface-light);
  display: flex; align-items: center; justify-content: center;
  color: var(--ods-text-tertiary); font-size: 10px; margin-bottom: 8px;
}
.lp-card-cta { color: var(--ods-primary); font-size: 12px; margin-top: 8px; }
.lp-rating { color: var(--ods-star); letter-spacing: 1px; }
.lp-meta { margin-top: 12px; color: var(--ods-text-tertiary); font-size: 12px; }
.lp-step-num { color: var(--ods-primary); font-weight: 600; font-size: 12px; }
.lp-clamp-5 {
  display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;
}

.lp-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--ods-gradient-resp); color: white;
  font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 16px;
  margin-bottom: 16px;
}

.lp-table {
  border: 1px solid var(--ods-border); border-radius: 12px; overflow: hidden; background: white;
}
.lp-section-table { background: var(--ods-surface-light); }
.lp-thead, .lp-trow { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; }
.lp-thead { background: var(--ods-surface-gray); font-size: 12px; font-weight: 600; }
.lp-thead > div, .lp-trow > div { padding: 12px; text-align: center; }
.lp-thead > div:first-child, .lp-tcell-label { text-align: left; }
.lp-trow { border-bottom: 1px solid var(--ods-border-light); font-size: 14px; }
.lp-trow:last-child { border-bottom: 0; }
.lp-accent-blue { color: var(--ods-primary); font-weight: 600; }
.lp-accent-green { color: var(--ods-resp-green); font-weight: 600; }

.lp-footer { background: #1A1A1A; color: rgba(255,255,255,0.6); padding: 32px 20px; font-size: 11px; }
.lp-footer-nav { margin-bottom: 12px; }
.lp-footer-nav span { margin-right: 16px; color: rgba(255,255,255,0.8); }

.lp-sticky-cta {
  position: sticky; bottom: 0; background: white; border-top: 1px solid var(--ods-border);
  padding: 12px 16px; z-index: 5;
}
.lp-sticky-cta .lp-btn { width: 100%; }

/* =============================================================================
 * 우측 Inspector
 * ===========================================================================*/
.insp-meta { padding: 12px 16px; border-bottom: 1px solid var(--border); }
.insp-meta .kicker { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.insp-meta .name { margin-top: 2px; font-weight: 600; }
.insp-tabs { display: flex; border-bottom: 1px solid var(--border); }
.insp-tabs button {
  flex: 1; padding: 8px; font-size: 12px;
  background: transparent; border: 0; border-bottom: 2px solid transparent;
  color: var(--muted);
}
.insp-tabs button.active { color: var(--text); border-bottom-color: var(--accent); }
.insp-content { flex: 1; padding: 16px; }

/* form fields */
.field { display: block; margin-bottom: 12px; }
.field-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.field-label { font-size: 12px; color: var(--text); }
.field-counter { font-size: 11px; color: var(--muted); }
.field-counter.error { color: var(--danger); }
.field-input, .field-textarea, .field-number, .field-select {
  width: 100%; padding: 6px 10px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 12px; outline: none;
}
.field-textarea { resize: vertical; min-height: 60px; }
.field-input.error, .field-textarea.error { border-color: var(--danger); }
.field-input:focus, .field-textarea:focus, .field-select:focus, .field-number:focus { border-color: var(--accent); }
.field-error { color: var(--danger); font-size: 11px; margin-top: 4px; }
.field-help { color: var(--muted); font-size: 10px; margin-top: 2px; }

.section-kicker {
  font-size: 11px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.05em;
  margin-bottom: 8px;
}

/* layout toggle (grid/carousel/row) */
.layout-toggle { display: flex; gap: 4px; margin-bottom: 4px; }
.layout-toggle button {
  flex: 1; padding: 6px; font-size: 11px;
  border: 1px solid var(--border); background: var(--bg); color: var(--muted); border-radius: 4px;
}
.layout-toggle button.active { border-color: var(--accent); background: rgba(124,92,255,0.1); color: var(--text); }
.layout-hint { font-size: 10px; color: var(--muted); margin-bottom: 12px; }

/* cells list */
.cell-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 6px; cursor: pointer;
}
.cell-row:hover { border-color: rgba(124,92,255,0.6); }
.cell-row.selected { border-color: var(--accent); background: rgba(124,92,255,0.1); }
.cell-row .idx { font-size: 10px; color: var(--muted); }
.cell-row .name { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cell-row .count { font-size: 10px; color: var(--muted); }
.cell-row .remove { background: transparent; border: 0; color: var(--muted); font-size: 11px; display: none; }
.cell-row:hover .remove { display: inline; }
.cell-row .remove:hover { color: var(--danger); }
.add-cell-btn {
  width: 100%; padding: 6px; font-size: 11px;
  border: 1px dashed var(--border); background: transparent; color: var(--muted); border-radius: 8px;
}
.add-cell-btn:hover { border-color: var(--accent); color: var(--text); }

/* cell slot editor */
.slot-box {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px; margin-bottom: 8px;
}
.slot-box .slot-head { display: flex; justify-content: space-between; margin-bottom: 4px; }
.slot-box .slot-name { font-size: 11px; font-weight: 500; }
.slot-box .slot-kind { font-size: 10px; color: var(--muted); }
.slot-box textarea, .slot-box input {
  width: 100%; padding: 4px 8px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-size: 11px; outline: none;
}
.slot-box textarea:focus, .slot-box input:focus { border-color: var(--accent); }

/* asset slot row */
.asset-slot {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 12px; margin-bottom: 8px;
}
.asset-slot .head { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
.asset-slot .head .key { color: var(--muted); font-size: 10px; }
.asset-empty-btn {
  width: 100%; padding: 12px; font-size: 12px;
  border: 1px dashed var(--border); background: transparent; color: var(--muted); border-radius: 8px;
}
.asset-filled { display: flex; gap: 12px; align-items: center; }
.asset-thumb {
  width: 56px; height: 56px; background: var(--panel-2); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 10px; flex-shrink: 0;
}
.asset-info { flex: 1; min-width: 0; font-size: 11px; }
.asset-info .id { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.asset-info .alt { color: var(--muted); }

/* tokens */
.token-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 6px 8px; margin-bottom: 6px;
}
.token-row .path { flex: 1; font-size: 12px; }
.token-row .ref { font-size: 10px; color: var(--muted); background: var(--panel-2); padding: 2px 6px; border-radius: 4px; }
.token-row button { background: transparent; border: 0; color: var(--muted); font-size: 10px; cursor: pointer; }
.token-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.token-card {
  border: 1px solid var(--border); background: var(--bg); border-radius: 8px;
  padding: 6px; cursor: pointer; text-align: left;
}
.token-card:hover { border-color: var(--accent); }
.token-card .swatch { height: 24px; width: 100%; border-radius: 4px; border: 1px solid var(--border); }
.token-card .lbl { font-size: 10px; margin-top: 4px; }
.token-card .key { font-size: 9px; color: var(--muted); }

/* =============================================================================
 * 모달
 * ===========================================================================*/
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 16px;
}
.modal-backdrop.hidden { display: none; }
.modal {
  width: 680px; max-width: 100%; background: var(--panel);
  border: 1px solid var(--border); border-radius: 12px;
  display: flex; flex-direction: column; max-height: 90vh;
}
.modal-head {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 20px; border-bottom: 1px solid var(--border);
}
.modal-head .title { font-size: 14px; font-weight: 600; }
.modal-head .desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.modal-head .close { background: transparent; border: 0; color: var(--muted); font-size: 16px; cursor: pointer; }

const state = {
  doc: { sections, meta: { slug: 'moving', title: '이사 — 오늘의집' } },
  selection: { sectionId: 'sec-usp', componentId: null, cellId: null },
  viewport: 'desktop',
  tab: 'props',
  draggedId: null,
  hoverId: null,
  addMenuOpen: false,
  assetModal: null,
  reviewModalOpen: false,
};

// =============================================================================
// 유틸
// =============================================================================
const $ = (id) => document.getElementById(id);
const esc = (s) => (s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'));
const nl2br = (s) => esc(s).replace(/\n/g, '<br/>');

function findSection(id) { return state.doc.sections.find(s => s.id === id); }
function selectedSection() { return findSection(state.selection.sectionId); }
function selectedComponent() {
  const sec = selectedSection();
  if (!sec || !state.selection.componentId) return null;
  for (const list of Object.values(sec.slots)) {
    const hit = list.find(c => c.id === state.selection.componentId);
    if (hit) return hit;
  }
  return null;
}

function validateField(value, spec) {
  if (spec.required && (value == null || value === '')) return '필수 입력';
  if (typeof value === 'string') {
    if (spec.maxChar !== undefined && value.length > spec.maxChar)
      return `최대 ${spec.maxChar}자 (현재 ${value.length}자)`;
    if (spec.maxLine !== undefined) {
      const lines = value.split(/\r?\n/).length;
      if (lines > spec.maxLine) return `최대 ${spec.maxLine}줄 (현재 ${lines}줄)`;
    }
  }
  return null;
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => t.classList.add('hidden'), 2400);
}

// =============================================================================
// 렌더링 — 좌측 SectionTree (라벨·추가 메뉴는 Next `SectionTree` / `section-add-menu.ts` 와 동일 규칙)
// =============================================================================
function renderTree() {
  const list = $('tree-list');
  list.innerHTML = state.doc.sections.map(s => {
    const def = SECTION_PRESETS[s.preset];
    const sel = state.selection.sectionId === s.id ? 'selected' : '';
    const hover = state.hoverId === s.id && state.draggedId !== s.id ? 'drag-over' : '';
    return `
      <div class="tree-item ${sel} ${hover}" data-id="${s.id}" draggable="${!s.locked}"
        onclick="selectSection('${s.id}')"
        ondragstart="onDragStart('${s.id}', event)"
        ondragend="onDragEnd()"
        ondragover="onDragOver('${s.id}', event)"
        ondrop="onDrop('${s.id}', event)">
        <span class="handle ${s.locked ? 'locked' : ''}">${s.locked ? '🔒' : '≡'}</span>
        <div class="label">
          <div class="name">${esc(def.label)}</div>
        </div>
        ${!s.locked ? `<button class="remove" onclick="event.stopPropagation(); removeSection('${s.id}')">×</button>` : ''}
      </div>`;
  }).join('');
  $('section-count').textContent = state.doc.sections.length + '개';
}

function renderAddMenu() {
  const menu = $('tree-add-menu');
  if (!state.addMenuOpen) { menu.classList.add('hidden'); return; }
  menu.classList.remove('hidden');
  const basic = ['usp','table','coverage','review','process','cross-sell','cta-form'];
  const marketing = [
    { p: 'hero', v: 'marketing' },
    { p: 'cta-form', v: 'marketing-form' },
    { p: 'usp', v: 'marketing' },
    { p: 'process', v: 'marketing' },
    { p: 'review', v: 'marketing' },
    { p: 'cta-form', v: 'marketing-contact' },
    { p: 'sticky-cta', v: 'marketing' },
  ];
  function addMenuLabel(preset, variant) {
    const d = SECTION_PRESETS[preset];
    if (variant === 'marketing-form') return d.label + ' · 상담 필드';
    if (variant === 'marketing-contact') return d.label + ' · 문의 박스';
    return d.label;
  }
  let html = '';
  html += '<p class="add-menu-group">기본</p>';
  html += basic.map(p => {
    const d = SECTION_PRESETS[p];
    return `<button type="button" onclick="addSection('${p}')">
      <div class="menu-label">▸ ${esc(d.label)}</div>
    </button>`;
  }).join('');
  html += '<p class="add-menu-group">마케팅 풀페이지 UI</p>';
  html += marketing.map(({ p, v }) => {
    const lab = addMenuLabel(p, v);
    return `<button type="button" onclick="addSection('${p}','${v}')">
      <div class="menu-label">▸ ${esc(lab)}</div>
    </button>`;
  }).join('');
  menu.innerHTML = html;
}

function renderPreview() {
  const frame = $('preview-frame');
  const vp = state.viewport;
  frame.dataset.viewport = vp;
  const widths = { mobile: 375, tablet: 768, desktop: 1280 };
  frame.style.width = widths[vp] + 'px';
  $('preview-meta').textContent = `${widths[vp]}px · /preview/${state.doc.meta.slug}`;
  $('preview-note').textContent =
    vp === 'mobile' ? 'iPhone 13 기준 · 375 × 812'
    : vp === 'tablet' ? 'iPad Mini 기준 · 768 × 1024'
    : 'Desktop · 1280 × auto';

  const html = state.doc.sections
    .filter(s => s.visibility[vp])
    .map(s => renderSection(s)).join('');
  $('preview-content').innerHTML = html;
  // 미리보기 영역 클릭 위임
  $('preview-content').querySelectorAll('section.lp-section-wrap').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      selectSection(el.dataset.id);
    });
  });
}

function renderSection(s) {
  const sel = state.selection.sectionId === s.id ? 'selected' : '';
  const inner = (() => {
    switch (s.preset) {
      case 'header': return renderHeaderSec(s);
      case 'hero': return renderHeroSec(s);
      case 'usp': case 'review': case 'process': case 'cross-sell':
        return renderCardSec(s, s.preset === 'review' ? 'gray' : 'white');
      case 'coverage': return renderCardSec(s, 'white', true);
      case 'table': return renderTableSec(s);
      case 'cta-form': return renderCtaFormSec(s);
      case 'sticky-cta': return renderStickyCtaSec(s);
      case 'footer': return renderFooterSec(s);
    }
    return '';
  })();
  return `<section class="lp-section-wrap ${sel}" data-id="${s.id}">
    <span class="section-tag">${esc(s.name)}</span>
    ${inner}
  </section>`;
}

function renderHeaderSec(s) {
  return `<div class="lp-header">
    <div class="lp-logo">${esc(s.props.logoText || '오늘의집')}</div>

function renderCardSec(s, bg, withBadge) {
  const bgClass = bg === 'gray' ? 'background: var(--ods-surface-gray);' : 'background: white;';
  const card = (s.slots.content || [])[0];
  let inner = `<div style="border:1px dashed var(--ods-border);border-radius:8px;padding:24px;text-align:center;color:var(--ods-text-tertiary);">카드 비어있음</div>`;
  if (card && card.preset === 'card') inner = renderCard(card.props);
  let badge = '';
  if (withBadge) {
    badge = `<div class="lp-badge">✓ ${esc(s.props.badgeLabel || '책임보장')}</div>`;
  }
  return `<div class="lp-section" style="${bgClass}">
    ${renderSecTitle(s)}
    ${badge}
    ${inner}
  </div>`;
}

function renderSecTitle(s) {
  const sub = s.props.sectionSubtitle;
  const main = s.props.sectionTitle;
  if (!sub && !main) return '';
  return `<div class="lp-section-title">
    ${sub ? `<div class="sub">${esc(sub)}</div>` : ''}
    ${main ? `<div class="main">${esc(main)}</div>` : ''}
  </div>`;
}

function renderCard(props) {
  const { usage, layout, cells } = props;
  if (layout.type === 'grid') {
    const c = layout.settings.columns;
    const gap = layout.settings.gap;
    return `<div class="lp-grid" style="--cols-mobile:${c.mobile};--cols-tablet:${c.tablet};--cols-desktop:${c.desktop};gap:${gap}px">
      ${cells.map(cell => renderCell(cell, usage)).join('')}
    </div>`;
  }
  if (layout.type === 'carousel') {
    const s = layout.settings;
    const w = s.cardWidth[state.viewport] || 320;
    const auto = s.autoScroll;
    const dur = (s.autoScrollDurationMs || 30000) / 1000;
    const loopCells = auto ? cells.concat(cells) : cells;
    return `<div class="lp-carousel">
      <div class="lp-carousel-track ${auto ? 'marquee' : ''}" style="--marquee-duration:${dur}s;gap:${s.gap}px">
        ${loopCells.map(cell => `<div class="lp-carousel-item" style="width:${w}px">${renderCell(cell, usage)}</div>`).join('')}
      </div>
    </div>`;
  }
  if (layout.type === 'row') {
    const s = layout.settings;
    const j = s.align === 'between' ? 'space-between' : s.align === 'around' ? 'space-around' : s.align;
    return `<div class="lp-row" style="justify-content:${j};flex-wrap:${s.wrap?'wrap':'nowrap'};gap:${s.gap}px">
      ${cells.map(cell => `<div style="flex:1;min-width:200px">${renderCell(cell, usage)}</div>`).join('')}
    </div>`;
  }
  return '';
}

function renderCell(cell, usage) {
  const s = cell.slots;
  const tx = (k) => s[k] && s[k].kind === 'text' ? s[k].text : null;
  const meta = (k) => s[k] && s[k].kind === 'meta' ? s[k].items : null;
  const rate = (k) => s[k] && s[k].kind === 'rating' ? s[k] : null;
  const ast = (k) => s[k] && s[k].kind === 'asset' ? s[k].asset.alt : null;
  const cta = (k) => s[k] && s[k].kind === 'cta' ? s[k] : null;
  switch (usage) {
    case 'usp': {
      return `<div class="lp-card card-usp">
        ${tx('tag') ? `<div class="lp-tag">${esc(tx('tag'))}</div>` : ''}
        ${tx('title') ? `<div class="lp-card-title">${nl2br(tx('title'))}</div>` : ''}
        ${tx('body') ? `<div class="lp-card-body">${nl2br(tx('body'))}</div>` : ''}
        ${ast('media') ? `<div class="lp-card-media">🖼 ${esc(ast('media'))}</div>` : ''}
      </div>`;
    }
    case 'review': {
      const r = rate('rating');
      let stars = '';
      if (r) { for (let i=0;i<(r.max||5);i++) stars += (i < r.value ? '★' : '☆'); }
      return `<div class="lp-card card-review">
        ${stars ? `<div class="lp-rating">${stars}</div>` : ''}
        ${tx('title') ? `<div class="lp-card-title">${nl2br(tx('title'))}</div>` : ''}
        ${tx('body') ? `<div class="lp-card-body lp-clamp-5">${nl2br(tx('body'))}</div>` : ''}
        ${meta('meta') && meta('meta').length ? `<div class="lp-meta">${esc(meta('meta').join(' · '))}</div>` : ''}
      </div>`;
    }
    case 'step': {
      return `<div class="lp-card card-step">
        ${tx('stepNumber') ? `<div class="lp-step-num">STEP ${esc(tx('stepNumber'))}</div>` : ''}
        ${tx('title') ? `<div class="lp-card-title">${esc(tx('title'))}</div>` : ''}
        ${tx('body') ? `<div class="lp-card-body">${nl2br(tx('body'))}</div>` : ''}
        ${ast('media') ? `<div class="lp-card-media">🖼 ${esc(ast('media'))}</div>` : ''}
      </div>`;
    }
    case 'service': {
      const c = cta('cta');
      return `<a class="lp-card card-service" href="${esc((c && c.url) || '#')}" onclick="event.preventDefault()">
        <div class="lp-card-icon">${ast('icon') ? '🖼' : ''}</div>
        ${tx('title') ? `<div class="lp-card-title">${esc(tx('title'))}</div>` : ''}
        ${tx('body') ? `<div class="lp-card-body">${esc(tx('body'))}</div>` : ''}
        ${c ? `<div class="lp-card-cta">${esc(c.label)} →</div>` : ''}
      </a>`;
    }
  }
  return '<div class="lp-card"></div>';
}

function renderTableSec(s) {

function renderInspector() {
  const sec = selectedSection();
  if (!sec) {
    $('insp-meta').innerHTML = '';
    $('insp-content').innerHTML = '<p style="color:var(--muted);font-size:12px;">섹션을 선택하세요</p>';

  `;

  });
  switch (state.tab) {

    case 'slots': renderSlotsTab(); break;
    case 'assets': renderAssetsTab(); break;

// ----- Props 탭 -----
function renderPropsTab() {
  const sec = selectedSection();
  const comp = selectedComponent();
  const root = $('insp-content');

  // Card 컴포넌트 선택된 경우 — 레이아웃 세부 옵션
  if (comp && comp.preset === 'card') {
    const p = comp.props;
    root.innerHTML = `
      <div class="section-kicker">Card · ${esc(p.layout.type)}</div>
      ${renderLayoutEditor(comp.id, p.layout)}
    `;
    bindLayoutEditor(comp.id);
    return;
  }

  // 일반 props (섹션 props 또는 일반 컴포넌트 props)
  const target = comp || sec;
  const spec = comp
    ? null  // table-row 등은 UI Spec 표시 생략
    : SECTION_PRESETS[sec.preset].uiSpec;
  if (!spec) {
    root.innerHTML = '<p style="color:var(--muted);font-size:12px;">props가 없습니다</p>';
    return;
  }
  const keys = Object.keys(spec);
  root.innerHTML = `
    <div class="section-kicker">${esc(SECTION_PRESETS[sec.preset].label)} Props</div>
    ${keys.map(k => renderPropField(target, k, spec[k])).join('')}
  `;
  bindPropFields(target);
}

function renderPropField(target, key, spec) {
  const val = target.props[key];
  const sval = typeof val === 'string' ? val : (val == null ? '' : String(val));
  const err = validateField(sval, spec);
  const chars = sval.length;
  const lines = sval.split(/\r?\n/).length;
  const maxLine = spec.maxLine || 1;
  const isTa = maxLine > 1;
  const counter = [
    spec.maxChar !== undefined ? `${chars}/${spec.maxChar}자` : null,
    spec.maxLine !== undefined && spec.maxLine > 1 ? `${lines}/${spec.maxLine}줄` : null,
  ].filter(Boolean).join(' · ');
  return `
    <div class="field" data-key="${key}">
      <div class="field-row">
        <span class="field-label">${esc(key)}${spec.required ? '<span style="color:var(--danger)">*</span>' : ''}</span>
        <span class="field-counter ${err ? 'error' : ''}">${counter}</span>
      </div>
      ${isTa
        ? `<textarea class="field-textarea ${err ? 'error' : ''}" rows="${Math.min(maxLine+1, 6)}">${esc(sval)}</textarea>`
        : `<input class="field-input ${err ? 'error' : ''}" value="${esc(sval)}" />`}
      ${err ? `<div class="field-error">${esc(err)}</div>` : ''}
    </div>
  `;
}

function bindPropFields(target) {
  $('insp-content').querySelectorAll('.field').forEach(field => {
    const key = field.dataset.key;
    const input = field.querySelector('input, textarea');
    if (!input) return;
    input.addEventListener('input', () => {
      target.props[key] = input.value;
      renderInspector();
      renderPreview();
    });
  });
}

// Layout 에디터 (grid/carousel/row)
function renderLayoutEditor(cardId, layout) {
  const t = layout.type;
  const s = layout.settings;
  let body = '';
  if (t === 'grid') {
    body = `
      <div class="section-kicker">Grid 컬럼</div>
      <div class="field"><div class="field-row"><span class="field-label">Mobile</span></div>
        <input type="number" class="field-number" data-path="columns.mobile" value="${s.columns.mobile}" min="1" max="6" /></div>
      <div class="field"><div class="field-row"><span class="field-label">Tablet</span></div>
        <input type="number" class="field-number" data-path="columns.tablet" value="${s.columns.tablet}" min="1" max="6" /></div>
      <div class="field"><div class="field-row"><span class="field-label">Desktop</span></div>
        <input type="number" class="field-number" data-path="columns.desktop" value="${s.columns.desktop}" min="1" max="6" /></div>
      <div class="field"><div class="field-row"><span class="field-label">Gap (px)</span></div>
        <input type="number" class="field-number" data-path="gap" value="${s.gap}" min="0" max="64" /></div>
    `;
  } else if (t === 'carousel') {
    body = `
      <div class="section-kicker">Carousel 카드 너비</div>
      <div class="field"><div class="field-row"><span class="field-label">Mobile (px)</span></div>
        <input type="number" class="field-number" data-path="cardWidth.mobile" value="${s.cardWidth.mobile}" min="120" max="800" /></div>
      <div class="field"><div class="field-row"><span class="field-label">Tablet (px)</span></div>
        <input type="number" class="field-number" data-path="cardWidth.tablet" value="${s.cardWidth.tablet}" min="120" max="800" /></div>
      <div class="field"><div class="field-row"><span class="field-label">Desktop (px)</span></div>
        <input type="number" class="field-number" data-path="cardWidth.desktop" value="${s.cardWidth.desktop}" min="120" max="800" /></div>
      <div class="field"><div class="field-row"><span class="field-label">Gap (px)</span></div>
        <input type="number" class="field-number" data-path="gap" value="${s.gap}" min="0" max="64" /></div>
      <label style="display:flex;align-items:center;gap:8px;margin-top:12px;">
        <input type="checkbox" data-path="autoScroll" ${s.autoScroll ? 'checked' : ''} />
        <span style="font-size:12px;">x scroll animation (autoScroll)</span>
      </label>
      ${s.autoScroll ? `
        <div class="field"><div class="field-row"><span class="field-label">Duration (ms)</span></div>
          <input type="number" class="field-number" data-path="autoScrollDurationMs" value="${s.autoScrollDurationMs}" min="5000" max="120000" step="1000" /></div>
      ` : ''}
    `;
  } else if (t === 'row') {
    body = `
      <div class="field">
        <div class="field-row"><span class="field-label">Align</span></div>
        <select class="field-select" data-path="align">
          ${['start','center','end','between','around'].map(a =>
            `<option value="${a}" ${s.align===a?'selected':''}>${a}</option>`).join('')}
        </select>
      </div>
      <div class="field"><div class="field-row"><span class="field-label">Gap (px)</span></div>
        <input type="number" class="field-number" data-path="gap" value="${s.gap}" min="0" max="64" /></div>
      <label style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" data-path="wrap" ${s.wrap ? 'checked' : ''} />
        <span style="font-size:12px;">Wrap (줄바꿈)</span>

function bindLayoutEditor(cardId) {
  $('insp-content').querySelectorAll('[data-path]').forEach(el => {
    el.addEventListener('input', () => {
      const card = findCardById(cardId); if (!card) return;
      const path = el.dataset.path;
      const val = el.type === 'checkbox' ? el.checked
                : el.type === 'number' ? Number(el.value) : el.value;
      setLayoutProp(card.props.layout.settings, path, val);
      renderInspector();
      renderPreview();
    });
  });
}

function setLayoutProp(target, path, val) {
  const parts = path.split('.');
  let cur = target;
  for (let i = 0; i < parts.length - 1; i++) cur = cur[parts[i]];
  cur[parts[parts.length - 1]] = val;
}

function findCardById(id) {
  for (const sec of state.doc.sections) {
    for (const list of Object.values(sec.slots)) {
      const hit = list.find(c => c.id === id);
      if (hit) return hit;
    }
  }
  return null;
}

// ----- Slots 탭 -----
function renderSlotsTab() {
  const sec = selectedSection();
  const root = $('insp-content');

  // Card 사용 섹션 — content 슬롯이 card 단일
  const cardInst = (sec.slots.content || [])[0];
  if (cardInst && cardInst.preset === 'card') {
    const p = cardInst.props;
    root.innerHTML = `
      <div class="section-kicker">Layout</div>
      <div class="layout-toggle">
        ${['grid','carousel','row'].map(l =>
          `<button class="${p.layout.type === l ? 'active' : ''}" onclick="changeLayout('${cardInst.id}','${l}')">${l}</button>`).join('')}
      </div>
      <div class="layout-hint">
        ${p.layout.type === 'grid' ? 'n:n 분할 — Props 탭에서 컬럼 수 조정'
          : p.layout.type === 'carousel' ? '고정 너비 + 좌우 스크롤 (autoScroll 토글)'
          : '한 줄 정렬'}
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span class="section-kicker" style="margin:0;">Cells (${p.cells.length})</span>
        <span style="font-size:10px;color:var(--muted);">usage: ${esc(p.usage)}</span>
      </div>
      ${p.cells.map((c, i) => renderCellRow(cardInst.id, c, i)).join('')}
      <button class="add-cell-btn" onclick="addCell('${cardInst.id}')">+ Cell 추가 (${esc(p.usage)})</button>
      ${state.selection.cellId ? renderCellSlotEditor(cardInst.id, state.selection.cellId, p) : ''}
    `;
    if (state.selection.cellId) bindCellSlotEditor(cardInst.id, state.selection.cellId);
    return;
  }

  // table.rows 또는 cta-form.fields
  let html = '';
  for (const [slotName, list] of Object.entries(sec.slots || {})) {
    if (slotName === 'tabs') continue;
    html += `<div class="section-kicker" style="margin-top:8px">${esc(slotName)} (${list.length})</div>`;
    list.forEach((c, i) => {
      const label = c.props.label || c.props.title || `#${i+1}`;
      html += `<div class="cell-row" onclick="selectCompId('${c.id}')"><span class="idx">#${i+1}</span><span class="name">${esc(label)}</span></div>`;
    });
  }
  root.innerHTML = html || '<p style="color:var(--muted);font-size:12px;">슬롯이 없습니다</p>';
}

function renderCellRow(cardId, cell, idx) {
  const selectedCell = state.selection.cellId === cell.id;
  const title = cell.slots.title;
  const previewLabel = title && title.kind === 'text' && title.text
    ? title.text.split('\n')[0]
    : `Cell #${idx+1}`;
  const filled = Object.values(cell.slots).filter(Boolean).length;
  return `<div class="cell-row ${selectedCell ? 'selected' : ''}" onclick="selectCell('${cardId}','${cell.id}')">
    <span class="idx">#${idx+1}</span>
    <span class="name">${esc(previewLabel)}</span>
    <span class="count">${filled} slots</span>
    <button class="remove" onclick="event.stopPropagation(); removeCell('${cardId}','${cell.id}')">×</button>
  </div>`;
}

function renderCellSlotEditor(cardId, cellId, cardProps) {
  const cell = cardProps.cells.find(c => c.id === cellId);
  if (!cell) return '';
  const keys = Object.keys(cell.slots);
  return `
    <div style="border-top:1px solid var(--border);margin-top:12px;padding-top:12px;">
      <div class="section-kicker">Cell Slots — #${cellId.slice(-3)}</div>
      ${keys.map(k => renderSlotBox(k, cell.slots[k])).join('')}
    </div>
  `;
}

function renderSlotBox(name, content) {
  if (!content) return '';
  let editor = '';
  if (content.kind === 'text') {
    editor = `<textarea rows="2" data-slot="${name}" data-kind="text">${esc(content.text)}</textarea>`;
  } else if (content.kind === 'meta') {
    editor = `<input type="text" data-slot="${name}" data-kind="meta" value="${esc(content.items.join(' / '))}" placeholder="/ 로 구분" />`;
  } else if (content.kind === 'rating') {
    editor = `<input type="number" min="0" max="${content.max||5}" data-slot="${name}" data-kind="rating" data-max="${content.max||5}" value="${content.value}" style="width:80px" />`;
  } else if (content.kind === 'asset') {
    editor = `<div style="font-size:11px;color:var(--muted)">${esc(content.asset.assetId || content.asset.url || '—')} (${esc(content.asset.alt)})</div>`;
  } else if (content.kind === 'cta') {
    editor = `<input type="text" data-slot="${name}" data-kind="cta-label" value="${esc(content.label)}" placeholder="라벨" style="margin-bottom:4px;" />
              <input type="text" data-slot="${name}" data-kind="cta-url" value="${esc(content.url)}" placeholder="URL" />`;
  }
  return `<div class="slot-box">
    <div class="slot-head"><span class="slot-name">${esc(name)}</span><span class="slot-kind">${esc(content.kind)}</span></div>
    ${editor}
  </div>`;
}

function bindCellSlotEditor(cardId, cellId) {
  $('insp-content').querySelectorAll('[data-slot]').forEach(el => {
    el.addEventListener('input', () => {
      const card = findCardById(cardId); if (!card) return;
      const cell = card.props.cells.find(c => c.id === cellId); if (!cell) return;
      const slotName = el.dataset.slot;
      const kind = el.dataset.kind;
      const cur = cell.slots[slotName];
      if (!cur) return;
      if (kind === 'text') cur.text = el.value;
      else if (kind === 'meta') cur.items = el.value.split('/').map(s => s.trim()).filter(Boolean);
      else if (kind === 'rating') cur.value = Number(el.value);
      else if (kind === 'cta-label') cur.label = el.value;
      else if (kind === 'cta-url') cur.url = el.value;
      renderPreview();
    });
  });
}

// ----- Assets 탭 -----
function renderAssetsTab() {
  const sec = selectedSection();
  const comp = selectedComponent();
  const root = $('insp-content');
  const def = SECTION_PRESETS[sec.preset];
  const slotSpecs = comp
    ? [] // 컴포넌트 단의 에셋 슬롯은 card 의 cell.slots 에서 처리
    : (def.assets || []);
  const slots = sec.assets;
  if (slotSpecs.length === 0) {
    root.innerHTML = '<p style="color:var(--muted);font-size:12px;">이 섹션은 에셋 슬롯이 없습니다 (카드 내부 미디어는 Slots 탭에서 편집)</p>';
    return;
  }
  root.innerHTML = `
    <div class="section-kicker">Asset Slots</div>
    ${slotSpecs.map(spec => {
      const filled = slots.find(a => a.slotName === spec.slotName);
      const inner = filled && filled.asset
        ? `<div class="asset-filled">
            <div class="asset-thumb">${filled.asset.type === 'svg' ? 'SVG' : 'IMG'}</div>
            <div class="asset-info">
              <div class="id">${esc(filled.asset.assetId || '')}</div>
              <div class="alt">${esc(filled.asset.alt)}</div>
            </div>
            <button class="btn" onclick="openAssetModal('${sec.id}', null, '${spec.slotName}')">교체</button>
          </div>`
        : `<button class="asset-empty-btn" onclick="openAssetModal('${sec.id}', null, '${spec.slotName}')">+ 에셋 임베드</button>`;
      return `<div class="asset-slot">
        <div class="head">
          <span>${esc(spec.label)}${spec.required ? '<span style="color:var(--danger)">*</span>':''}</span>
          <span class="key">${esc(spec.slotName)}</span>
        </div>
        ${inner}
      </div>`;
    }).join('')}
  `;
}

// ----- Tokens 탭 -----

  const sec = selectedSection();
  const root = $('insp-content');

  root.innerHTML = `
    <div class="section-kicker">묶인 토큰</div>

// Drag & drop
function onDragStart(id, ev) {
  state.draggedId = id;
  ev.dataTransfer.effectAllowed = 'move';
}
function onDragEnd() { state.draggedId = null; state.hoverId = null; renderTree(); }
function onDragOver(id, ev) {
  const sec = findSection(id);
  if (!sec || sec.locked || !state.draggedId || state.draggedId === id) return;
  ev.preventDefault();
  if (state.hoverId !== id) { state.hoverId = id; renderTree(); }
}
function onDrop(id, ev) {
  ev.preventDefault();
  if (!state.draggedId) return;
  const fromIdx = state.doc.sections.findIndex(s => s.id === state.draggedId);
  const toIdx = state.doc.sections.findIndex(s => s.id === id);
  if (fromIdx < 0 || toIdx < 0) return;
  if (state.doc.sections[fromIdx].locked || state.doc.sections[toIdx].locked) return;
  const [moved] = state.doc.sections.splice(fromIdx, 1);
  state.doc.sections.splice(toIdx, 0, moved);
  state.draggedId = null; state.hoverId = null;
  renderAll();
  showToast('섹션 순서를 변경했습니다');
}
window.onDragStart = onDragStart; window.onDragEnd = onDragEnd; window.onDragOver = onDragOver; window.onDrop = onDrop;

function removeSection(id) {
  const s = findSection(id); if (!s || s.locked) return;
  if (!confirm(`"${s.name}" 섹션을 삭제할까요?`)) return;
  state.doc.sections = state.doc.sections.filter(x => x.id !== id);
  if (state.selection.sectionId === id) state.selection.sectionId = null;
  renderAll();
}
window.removeSection = removeSection;

function toggleAddMenu() {
  state.addMenuOpen = !state.addMenuOpen;
  renderAddMenu();
}
window.toggleAddMenu = toggleAddMenu;

function addSection(preset, variant) {
  const def = SECTION_PRESETS[preset];
  let name = def.label;
  if (variant === 'marketing-form') name = def.label + ' · 상담 필드';
  else if (variant === 'marketing-contact') name = def.label + ' · 문의 박스';
  const id = `sec-${preset}-${Math.random().toString(36).slice(2,8)}`;
  const props = variant ? { variant } : {};
  const newSec = {
    id, preset, name, locked: !!def.locked,
    props, slots: {}, assets: [],
    visibility: { mobile: true, tablet: true, desktop: true }
  };
  // 카드 섹션은 기본 card 한 개 추가
  if (['usp','coverage','review','process','cross-sell'].includes(preset)) {
    const usage = preset === 'review' ? 'review'
      : preset === 'process' ? 'step'
      : preset === 'cross-sell' ? 'service'
      : 'usp';
    const layout = preset === 'review'
      ? { type: 'carousel', settings: { cardWidth: { mobile:280, tablet:320, desktop:360 }, gap:16, autoScroll:true, autoScrollDurationMs:30000, loop:true } }
      : preset === 'cross-sell'
        ? { type: 'row', settings: { align:'start', gap:16, wrap:true } }
        : { type: 'grid', settings: { columns: { mobile:1, tablet:2, desktop:4 }, gap:16 } };
    newSec.slots.content = [buildCard({
      id: `card-${id}`, usage, layout,
      cells: [CARD_USAGE_PRESETS[usage].defaultCell()].map((slots,i) => ({
        id: `cell-${Math.random().toString(36).slice(2,6)}`, slots
      })),
    })];
  }
  const stickyIdx = state.doc.sections.findIndex(s => s.preset === 'sticky-cta');
  if (stickyIdx >= 0) state.doc.sections.splice(stickyIdx, 0, newSec);
  else state.doc.sections.push(newSec);
  state.addMenuOpen = false;
  state.selection.sectionId = id;
  renderAll();
  showToast(`"${def.label}" 섹션을 추가했습니다`);
}
window.addSection = addSection;

// Card actions
function changeLayout(cardId, type) {
  const card = findCardById(cardId); if (!card) return;
  const defaults = {
    grid: { type: 'grid', settings: { columns: { mobile:1, tablet:2, desktop:4 }, gap:16 } },
    carousel: { type: 'carousel', settings: { cardWidth: { mobile:280, tablet:320, desktop:360 }, gap:16, autoScroll:true, autoScrollDurationMs:30000, loop:true } },
    row: { type: 'row', settings: { align:'start', gap:16, wrap:true } }
  };
  card.props.layout = defaults[type];
  renderInspector(); renderPreview();
  showToast(`Layout: ${type}`);
}
window.changeLayout = changeLayout;

function addCell(cardId) {
  const card = findCardById(cardId); if (!card) return;
  const preset = CARD_USAGE_PRESETS[card.props.usage];
  const newCell = { id: `cell-${Math.random().toString(36).slice(2,6)}`, slots: preset.defaultCell() };
  card.props.cells.push(newCell);
  state.selection.cellId = newCell.id;
  renderInspector(); renderPreview();
}
window.addCell = addCell;

function removeCell(cardId, cellId) {
  const card = findCardById(cardId); if (!card) return;
  card.props.cells = card.props.cells.filter(c => c.id !== cellId);
  if (state.selection.cellId === cellId) state.selection.cellId = null;
  renderInspector(); renderPreview();
}
window.removeCell = removeCell;

// Asset modal
let assetModalCtx = null;
function openAssetModal(sectionId, componentId, slotName) {
  assetModalCtx = { sectionId, componentId, slotName };
  $('asset-modal-desc').textContent = `슬롯: ${slotName}`;
  $('asset-modal').classList.remove('hidden');
  $('asset-search').value = '';
  renderAssetGrid();
}
window.openAssetModal = openAssetModal;

function closeAssetModal() {
  $('asset-modal').classList.add('hidden');
  assetModalCtx = null;
}
window.closeAssetModal = closeAssetModal;

function renderAssetGrid() {
  const q = ($('asset-search').value || '').toLowerCase();
  const filtered = MOCK_ASSETS.filter(a =>
    a.assetId.toLowerCase().includes(q) || a.alt.toLowerCase().includes(q));
  $('asset-grid').innerHTML = filtered.map(a => `
    <button class="asset-card" onclick="pickAsset('${a.assetId}')">
      <div class="ph">${a.type.toUpperCase()}</div>
      <div class="name">${esc(a.alt)}</div>
      <div class="id">${esc(a.assetId)}</div>
      <div class="id">${a.w}×${a.h} · ${a.kb}KB</div>
    </button>`).join('');
}
window.renderAssetGrid = renderAssetGrid;

function pickAsset(assetId) {
  if (!assetModalCtx) return;
  const asset = MOCK_ASSETS.find(a => a.assetId === assetId);
  const sec = findSection(assetModalCtx.sectionId);
  if (!sec || !asset) return;
  const slotName = assetModalCtx.slotName;
  // 섹션 단 assets 만 처리 (cell 내부 media 는 Slots 탭에서)
  sec.assets = sec.assets.filter(a => a.slotName !== slotName);
  sec.assets.push({ slotName, asset: { ...asset } });
  closeAssetModal();
  renderInspector(); renderPreview();
  showToast(`에셋 임베드: ${asset.assetId}`);
}
window.pickAsset = pickAsset;

// Tokens
function promptBindToken(tokenKey) {
  const sec = selectedSection(); if (!sec) return;
  const path = prompt(`어떤 prop 에 ${tokenKey} 토큰을 묶을까요?\n(e.g. title.color, background)`, 'background');
  if (!path) return;
  sec.tokens = (sec.tokens || []).filter(t => t.propPath !== path);
  sec.tokens.push({ propPath: path, tokenRef: tokenKey });
  renderInspector();
  showToast(`토큰 바인딩: ${path} → ${tokenKey}`);
}
window.promptBindToken = promptBindToken;

function unbindToken(idx) {
  const sec = selectedSection(); if (!sec || !sec.tokens) return;
  sec.tokens.splice(idx, 1);
  renderInspector();
}
window.unbindToken = unbindToken;

      <div class="review-kicker">UI Spec 검증</div>

        : `<div class="review-error">
            <div style="font-weight:500;">${violations.length}개의 위반이 있습니다</div>
            <ul>${violations.slice(0,8).map(v =>
              `<li><span style="color:var(--muted)">${esc(v.where)}</span> · <span style="color:var(--danger)">${esc(v.field)}</span>: ${esc(v.message)}</li>`).join('')}</ul>
            ${violations.length > 8 ? `<div style="color:var(--muted);margin-top:4px">...외 ${violations.length-8}건</div>` : ''}
          </div>`}
    </div>
    <div class="review-section">
      <div class="review-kicker">담당자</div>
      <div style="background:var(--bg);border:1px solid var(--border);padding:8px;border-radius:8px;font-size:11px;line-height:1.6;">
        <div><span style="color:var(--muted)">Designer:</span> Jisun Moon</div>
        <div><span style="color:var(--muted)">Developer:</span> TBD</div>
        <div><span style="color:var(--muted)">PM:</span> TBD</div>
      </div>
    </div>
    <div class="review-section">
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><input type="checkbox" checked /><span>Jira 디자인 검수 티켓 생성</span></label>
      <label style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><input type="checkbox" checked /><span>Jira 개발 검수 티켓 생성</span></label>
      <label style="display:flex;align-items:center;gap:8px;"><input type="checkbox" checked /><span>Slack 채널 발송 (#landing-review)</span></label>
    </div>
  `;
  $('review-submit').disabled = violations.length > 0;
  $('review-submit').style.opacity = violations.length > 0 ? '0.5' : '1';
  $('review-modal').classList.remove('hidden');
}
window.openReviewModal = openReviewModal;

function closeReviewModal() {
  $('review-modal').classList.add('hidden');
  state.reviewModalOpen = false;
}
window.closeReviewModal = closeReviewModal;

function submitReview() {
  closeReviewModal();
  showToast('검수 요청을 보냈습니다 (시뮬레이션)');
}
window.submitReview = submitReview;

function collectViolations() {
  const out = [];
  for (const sec of state.doc.sections) {
    const spec = SECTION_PRESETS[sec.preset].uiSpec || {};
    for (const [k, fs] of Object.entries(spec)) {
      const err = validateField(sec.props[k], fs);
      if (err) out.push({ where: sec.name, field: k, message: err });
    }
    // cell uiSpec
    const card = (sec.slots.content || [])[0];
    if (card && card.preset === 'card') {
      const usagePre = CARD_USAGE_PRESETS[card.props.usage];
      if (usagePre) {
        card.props.cells.forEach((cell, i) => {
          for (const [k, fs] of Object.entries(usagePre.slotSpec)) {
            const c = cell.slots[k];
            const val = c && c.kind === 'text' ? c.text : null;
            if (fs.required && (!c || (c.kind === 'text' && !val))) {
              out.push({ where: `${sec.name} > cell#${i+1}`, field: k, message: '필수 입력' });
              continue;
            }
            if (val != null && fs.maxChar !== undefined && val.length > fs.maxChar) {
              out.push({ where: `${sec.name} > cell#${i+1}`, field: k, message: `최대 ${fs.maxChar}자 (현재 ${val.length}자)` });
            }
            if (val != null && fs.maxLine !== undefined) {
              const lines = val.split(/\r?\n/).length;
              if (lines > fs.maxLine) out.push({ where: `${sec.name} > cell#${i+1}`, field: k, message: `최대 ${fs.maxLine}줄 (현재 ${lines}줄)` });
            }
          }
        });
      }
    }
  }
  return out;
}

// 메뉴 외부 클릭 닫기
document.addEventListener('click', (e) => {
  if (state.addMenuOpen) {
    const footer = e.target.closest('.tree-footer');
    if (!footer) { state.addMenuOpen = false; renderAddMenu(); }
  }
});

function renderAll() {
  renderTree();
  renderAddMenu();
  renderPreview();
  renderInspector();
  $('doc-title').textContent = state.doc.meta.title;
}
renderAll();
